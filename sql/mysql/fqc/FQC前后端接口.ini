接口4：abb/api/v1/fqc/display
请求方式：get
前端向后端发送查询搜索请求：
{
  "pageNum": 1,                           // 当前页码 
  "pageSize": 10,                         // 每页条数
  "keywords": "504458951/4001/K86",       // 关键字（可搜索所有数据字段）
  "createTimeStart":"2026-05-01"          //创建时间开始--支持时间范围搜索
  "createTimeEnd":"2026-05-06"            //创建时间结束--也支持仅时间搜索

}

Response body：
{
  "code": "200",
  "data": {
    "list": [
      {
        "id": "4",                                //主键id
        "fqcDailyInput": "78",                    //每天下线开关柜数量
        "fqcDailyOutput": "56",                   //每天挂证开关柜数量
        "fqcQuantityInstock": "35",               //历史库存开关柜数量
        "fqcWithstandUndistributed": "26",        //下线待分配数量
        "fqcFunctionUndistributed": "20",         //功能完成待挂证数量
