接口3：abb/api/v1/fqc/switch-cabinets/{id}

请求方式：POST` 或 `PUT

前端对开关柜进行员工指派：
{
  "id": 1001,                    // 必传：告诉后端修改的是哪一条记录
  "functionEmpName": "张三",     // 指派后的功能员工ID--必填
  "area": "K2"                  // 指派后的区域--必填 其他参数可选填
}

后端返回给前端：
{
  "code": 200,
  "msg": "保存成功"
}


